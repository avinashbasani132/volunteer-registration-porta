{% extends "base.html" %}

{% block title %}Admin Portal Access - Kindred NGO{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center align-items-center" style="min-height: 70vh;">
        <div class="col-md-6 col-lg-5">
            <div class="card-glassmorphism p-4 p-md-5">
                <!-- Portal Branding -->
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 text-accent-custom rounded-circle p-3 mb-3" style="width: 60px; height: 60px;">
                        <i class="bi bi-shield-lock-fill fs-3 animate-pulse"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Portal Access</h3>
                    <p class="text-muted small">Sign in to manage volunteers and download registration reports.</p>
                </div>
                
                <!-- Login Form -->
                <form action="{{ url_for('login') }}" method="POST" class="needs-validation">
                    <!-- Username Input -->
                    <div class="mb-4">
                        <label for="username" class="form-label-custom">Admin Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-glass text-muted"><i class="bi bi-person-badge"></i></span>
                            <input type="text" class="form-control form-control-custom border-start-0" id="username" name="username" placeholder="Enter username" required autocomplete="username" autofocus>
                        </div>
                    </div>
                    
                    <!-- Password Input -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label for="password" class="form-label-custom mb-0">Security Password</label>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text bg-transparent border-end-0 border-glass text-muted"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control form-control-custom border-start-0" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                        </div>
                    </div>
                    
                    <!-- Remember Session Checkbox -->
                    <div class="form-check mb-4">
                        <input class="form-check-input form-check-input-custom" type="checkbox" name="remember" id="remember">
                        <label class="form-check-label text-muted small" for="remember">
                            Stay signed in on this device
                        </label>
                    </div>
                    
                    <!-- Submit Access -->
                    <button type="submit" class="btn btn-premium w-100 py-2 d-flex align-items-center justify-content-center">
                        <span>Authenticate Portal</span>
                        <i class="bi bi-arrow-right-short fs-5 ms-1"></i>
                    </button>
                </form>
            </div>
            
            <!-- Link Back to Public Portal -->
            <div class="text-center mt-4">
                <a href="{{ url_for('register') }}" class="text-muted text-decoration-none small hover-accent">
                    <i class="bi bi-arrow-left me-1"></i>Return to Public Volunteer Page
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
